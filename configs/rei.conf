[General]
scale = 1.0
enable-animations = true
animated-background-placeholder = kurisu.png
background-fill-mode = "fill"

[LockScreen]
display = true
padding-top = 0
padding-right = 0
padding-bottom = 0
padding-left = 0
background = "kurisu.mp4"
use-background-color = false
background-color = "#050505"
blur = 32
brightness = 0.0
saturation = 0.0

[LockScreen.Clock]
display = true
position = "center"
align = "center"
format = "hh:mm"
font-family = "RedHatDisplay"
font-size = 120
font-weight = 900
color = "#050505"

[LockScreen.Date]
display = true
format = "dddd, MMMM dd, yyyy"
locale = "en_US"
font-family = "RedHatDisplay"
font-size = 25
font-weight = 800
color = "#a0a0ff"
margin-top = -15

[LockScreen.Message]
display = false
position = "bottom-center"
align = "center"
text = "Press any key"
font-family = "RedHatDisplay"
font-size = 12
font-weight = 400
display-icon = true
icon = "enter.svg"
icon-size = 16
color = "#e0e0ff"
paint-icon = true
spacing = 0

# ─────────────────────────────────────────────────────────────────────────────
# LOGIN SCREEN — blur suave para que el login resalte sobre el video
# ─────────────────────────────────────────────────────────────────────────────
[LoginScreen]
background = "rei.mp4"
use-background-color = false
background-color = "#050505"
blur = 0
brightness = 0
saturation = 0
padding-left = 0

[LoginScreen.LoginArea]
position = "center"
margin = -1

# ─────────────────────────────────────────────────────────────────────────────
# AVATAR — desactivado (tamaños 0, sin borde, opacidad 0)
# ─────────────────────────────────────────────────────────────────────────────

[LoginScreen.LoginArea.Username]
font-family = "RedHatDisplay"
font-size = 15
font-weight = 700
color = "#e0e0ff"
margin = 8

# ─────────────────────────────────────────────────────────────────────────────
# PANEL SEMITRANSPARENTE — compacto (width 200) y bien oscuro (opacity 0.82)
# Input + botón sin gap entre sí formando una sola cápsula
# ─────────────────────────────────────────────────────────────────────────────
[LoginScreen.LoginArea.PasswordInput]
width = 200
height = 36
display-icon = true
font-family = "RedHatDisplay"
font-size = 12
icon = "password.svg"
icon-size = 14
content-color = "#e0e0ff"
background-color = "#0a0a0f"
background-opacity = 0.82
border-size = 1
border-color = "#5d5dff"
border-radius-left = 10
border-radius-right = 10
margin-top = 8
masked-character = "●"

[LoginScreen.LoginArea.LoginButton]
background-color = "#5d5dff"
background-opacity = 0.0
active-background-color = "#5d5dff"
active-background-opacity = 1.0
icon = "arrow-right.svg"
icon-size = 16
content-color = "#5d5dff"
active-content-color = "#050505"
border-size = 1
border-color = "#5d5dff"
border-radius-left = 0
border-radius-right = 10
margin-left = 0
show-text-if-no-password = true
hide-if-not-needed = true
font-family = "RedHatDisplay"
font-size = 12
font-weight = 600

[LoginScreen.LoginArea.Spinner]
display-text = true
text = "Logging in"
font-family = "RedHatDisplay"
font-weight = 600
font-size = 13
icon-size = 26
icon = "spinner.svg"
color = "#5d5dff"
spacing = 5

[LoginScreen.LoginArea.WarningMessage]
font-family = "RedHatDisplay"
font-size = 11
font-weight = 400
normal-color = "#a0a0ff"
warning-color = "#ffe066"
error-color = "#ff1a4d"
margin-top = 8

# ─────────────────────────────────────────────────────────────────────────────
# MENU AREA — botón de power en rojo como detalle
# ─────────────────────────────────────────────────────────────────────────────
[LoginScreen.MenuArea.Buttons]
margin-top = 0
margin-right = 0
margin-bottom = 80
margin-left = 80
size = 28
border-radius = 6
spacing = 8
font-family = "RedHatDisplay"

[LoginScreen.MenuArea.Popups]
max-height = 280
item-height = 30
item-spacing = 2
padding = 5
display-scrollbar = false
margin = 5
background-color = "#0a0a0f"
background-opacity = 0.92
active-option-background-color = "#5d5dff"
active-option-background-opacity = 1.0
content-color = "#a0a0ff"
active-content-color = "#050505"
font-family = "RedHatDisplay"
border-size = 1
border-color = "#5d5dff"
font-size = 11
icon-size = 15

[LoginScreen.MenuArea.Session]
display = true
position = "bottom-left"
index = 4
popup-direction = "up"
popup-align = "center"
display-session-name = true
button-width = 100
popup-width = 200
background-color = "#0a0a0f"
background-opacity = 0.0
active-background-opacity = 0.15
content-color = "#a0a0ff"
active-content-color = "#e0e0ff"
border-size = 0
font-size = 10
icon-size = 15

[LoginScreen.MenuArea.Layout]
display = true
position = "bottom-left"
index = 3
popup-direction = "up"
popup-align = "center"
popup-width = 180
display-layout-name = true
background-color = "#0a0a0f"
background-opacity = 0.0
active-background-opacity = 0.15
content-color = "#a0a0ff"
active-content-color = "#e0e0ff"
border-size = 0
font-size = 10
icon = "language.svg"
icon-size = 15

[LoginScreen.MenuArea.Keyboard]
display = true
position = "bottom-left"
index = 2
background-color = "#0a0a0f"
background-opacity = 0.0
active-background-opacity = 0.15
content-color = "#a0a0ff"
active-content-color = "#e0e0ff"
border-size = 0
icon = "keyboard.svg"
icon-size = 15

[LoginScreen.MenuArea.Power]
display = true
position = "bottom-left"
index = 1
popup-direction = "up"
popup-align = "center"
popup-width = 100
background-color = "#0a0a0f"
background-opacity = 0.0
active-background-opacity = 0.15
content-color = "#ff1a4d"
active-content-color = "#ff4d6d"
border-size = 0
icon = "power.svg"
icon-size = 15

[LoginScreen.VirtualKeyboard]
scale = 1.0
position = "login"
start-hidden = true
background-color = "#0a0a0f"
background-opacity = 0.95
key-content-color = "#a0a0ff"
key-color = "#10101a"
key-opacity = 1.0
key-active-background-color = "#1a1a25"
key-active-opacity = 0.0
selection-background-color = "#252535"
selection-content-color = "#e0e0ff"
primary-color = "#5d5dff"
border-size = 1
border-color = "#5d5dff"

[Tooltips]
enable = true
font-family = "RedHatDisplay"
font-size = 11
content-color = "#e0e0ff"
background-color = "#0a0a0f"
background-opacity = 0.95
border-radius = 6
disable-user = false
disable-login-button = false
